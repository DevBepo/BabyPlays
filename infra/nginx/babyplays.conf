server {
    listen 80;
    server_name babyplays.com.br;

    return 302 http://www.babyplays.com.br$request_uri;
}

server {
    listen 80;
    server_name www.babyplays.com.br;

    autoindex off;
    client_max_body_size 10m;

    access_log /var/log/nginx/frontend-access.log;
    error_log /var/log/nginx/frontend-error.log warn;

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name api.babyplays.com.br;

    autoindex off;
    client_max_body_size 10m;

    access_log /var/log/nginx/api-access.log;
    error_log /var/log/nginx/api-error.log warn;

    location /static/ {
        alias /srv/babyplays/static/;
        autoindex off;
        add_header X-Content-Type-Options nosniff always;
        try_files $uri =404;
    }

    location /media/ {
        alias /srv/babyplays/media/;
        autoindex off;
        add_header X-Content-Type-Options nosniff always;
        add_header Content-Disposition "inline";
        try_files $uri =404;
        types {
            image/avif avif;
            image/gif gif;
            image/jpeg jpg jpeg;
            image/png png;
            image/webp webp;
            application/pdf pdf;
        }
        default_type application/octet-stream;
    }

    location / {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
