services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - /srv/babyplays/env/postgres.env
    volumes:
      - /srv/babyplays/postgres:/var/lib/postgresql/data
    networks:
      - babyplays_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      args:
        DJANGO_UID: ${DJANGO_UID:-1000}
        DJANGO_GID: ${DJANGO_GID:-1000}
    restart: unless-stopped
    env_file:
      - /srv/babyplays/env/backend.env
    volumes:
      - /srv/babyplays/media:/app/media
      - /srv/babyplays/static:/app/staticfiles
      - /var/log/babyplays:/var/log/babyplays
    depends_on:
      db:
        condition: service_healthy
    networks:
      - babyplays_internal
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nrequest = urllib.request.Request('http://127.0.0.1:8000/api/auth/csrf/', headers={'Host': 'api.babyplays.com.br'})\nurllib.request.urlopen(request, timeout=5).read()\nPY"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      # Build args NEXT_PUBLIC_* e FRONTEND_HSTS_SECONDS sao resolvidos no
      # build pelo ambiente do comando docker compose, nao pelo env_file runtime abaixo.
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://api.babyplays.com.br}
        NEXT_PUBLIC_BABYPLAYS_WHATSAPP: ${NEXT_PUBLIC_BABYPLAYS_WHATSAPP:-}
        NEXT_PUBLIC_BABYPLAYS_INSTAGRAM_URL: ${NEXT_PUBLIC_BABYPLAYS_INSTAGRAM_URL:-}
        FRONTEND_HSTS_SECONDS: ${FRONTEND_HSTS_SECONDS:-0}
    restart: unless-stopped
    env_file:
      - /srv/babyplays/env/frontend.env
    depends_on:
      backend:
        condition: service_started
    networks:
      - babyplays_internal
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/babyplays.conf:/etc/nginx/conf.d/default.conf:ro
      - /srv/babyplays/certs:/etc/nginx/certs:ro
      - /srv/babyplays/media:/srv/babyplays/media:ro
      - /srv/babyplays/static:/srv/babyplays/static:ro
      - /var/log/babyplays:/var/log/nginx
    networks:
      - babyplays_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  babyplays_internal:
    driver: bridge
